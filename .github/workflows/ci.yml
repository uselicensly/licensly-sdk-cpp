name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake libsodium-dev libcurl4-openssl-dev

      - name: Check contract lock shape
        run: |
          python3 - <<'PY'
          import json
          lock = json.load(open("contract.lock.json"))
          assert lock.get("contract_version"), "missing contract_version"
          assert lock.get("bundle_sha256"), "missing bundle_sha256"
          print("lock ok", lock["contract_version"])
          PY

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
        env:
          LICENSLY_SKIP_INTEGRATION: "1"
